{% extends 'base.html' %}

{% block title %}Sign Up - Form{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Form" class="auth-logo">
        <h2>Create Account</h2>
        <p>Start your 7-day free trial</p>
        
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a strong password" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        
        <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</div>
{% endblock %}
