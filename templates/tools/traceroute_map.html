{% extends 'base.html' %}
{% block title %}Traceroute Map - Form{% endblock %}
{% block content %}
<div class="dashboard">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}">Overview</a>
            <a href="{{ url_for('vpn_dashboard') }}">VPN</a>
            <a href="{{ url_for('speed_sharing_dashboard') }}">Speed Sharing</a>
            <a href="{{ url_for('security_dashboard') }}">Security</a>
            <a href="{{ url_for('mesh_dashboard') }}">Mesh Network</a>
            <a href="{{ url_for('tools_dashboard') }}" class="active">Tools</a>
            <a href="{{ url_for('analytics_dashboard') }}">Analytics</a>
            <a href="{{ url_for('history_dashboard') }}">History</a>
            <a href="{{ url_for('devices_dashboard') }}">Devices</a>
            <a href="{{ url_for('account_dashboard') }}">Account</a>
            <a href="{{ url_for('settings_dashboard') }}">Settings</a>
        </nav>
    </aside>
    <main class="dashboard-content">
        <div class="tool-page-header">
            <a href="{{ url_for('tools_dashboard') }}" class="back-link">← Back to Tools</a>
            <h1>Traceroute Map</h1>
        </div>
        <div class="card">
            <div class="input-group">
                <input type="text" id="target" placeholder="8.8.8.8" class="form-control">
                <button class="btn btn-primary" onclick="runTraceroute()">Trace & Map</button>
            </div>
            <div id="map" style="height: 400px; margin-top: 20px; border-radius: 8px;"></div>
            <div id="results" class="results-area"></div>
        </div>
    </main>
</div>
<script src="https://maps.googleapis.com/maps/api/js?callback=initMap" async defer></script>
<script>
let map;
function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 0, lng: 0 },
        zoom: 2,
    });
}
async function runTraceroute() {
    const target = document.getElementById('target').value || '8.8.8.8';
    const res = await fetch('/api/tools/traceroute', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ target })
    });
    const data = await res.json();
    
    const bounds = new google.maps.LatLngBounds();
    const path = [];
    data.hops.forEach(hop => {
        const pos = {lat: hop.lat, lng: hop.lng};
        new google.maps.Marker({ position: pos, map, title: `Hop ${hop.hop}: ${hop.address}` });
        path.push(pos);
        bounds.extend(pos);
    });
    new google.maps.Polyline({ path, map, strokeColor: "#FF0000" });
    map.fitBounds(bounds);
    document.getElementById('results').innerHTML = data.hops.map(h => `Hop ${h.hop}: ${h.address}`).join('<br>');
}
</script>
{% endblock %}
