{% extends 'base.html' %}
{% block title %}Packet Detector - Form Speed{% endblock %}
{% block content %}
<div class="dashboard">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}">Overview</a>
            <a href="{{ url_for('vpn_dashboard') }}">VPN</a>
            <a href="{{ url_for('speed_sharing_dashboard') }}">Speed Sharing</a>
            <a href="{{ url_for('security_dashboard') }}">Security</a>
            <a href="{{ url_for('mesh_dashboard') }}">Mesh Network</a>
            <a href="{{ url_for('tools_dashboard') }}" class="active">Tools</a>
            <a href="{{ url_for('analytics_dashboard') }}">Analytics</a>
            <a href="{{ url_for('history_dashboard') }}">History</a>
            <a href="{{ url_for('devices_dashboard') }}">Devices</a>
            <a href="{{ url_for('account_dashboard') }}">Account</a>
            <a href="{{ url_for('settings_dashboard') }}">Settings</a>
        </nav>
    </aside>
    <main class="dashboard-content">
        <div class="tool-page-header">
            <a href="{{ url_for('tools_dashboard') }}" class="back-link">← Back to Tools</a>
            <h1>Packet Detector</h1>
        </div>
        <div class="card">
            <p>Real-time packet detection and mapping.</p>
            <button class="btn btn-primary" onclick="runPacketDetector()">Start Detection</button>
            <div id="map" style="height: 400px; margin-top: 20px; border-radius: 8px;"></div>
            <div id="results" class="results-area"></div>
        </div>
    </main>
</div>
<script src="https://maps.googleapis.com/maps/api/js?callback=initMap&loading=async" async defer></script>
<script>
let map;
async function initMap() {
    const { Map } = await google.maps.importLibrary("maps");
    const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
    
    map = new Map(document.getElementById("map"), {
        center: { lat: 0, lng: 0 },
        zoom: 2,
        mapId: "DEMO_MAP_ID"
    });
    window.AdvancedMarkerElement = AdvancedMarkerElement;
}
async function runPacketDetector() {
    const res = await fetch('/api/tools/packet-detector', {method: 'POST'});
    const data = await res.json();
    
    data.packets.forEach(p => {
        new window.AdvancedMarkerElement({ 
            position: {lat: p.lat, lng: p.lng}, 
            map, 
            title: `${p.type} from ${p.source}`
        });
    });
    document.getElementById('results').innerHTML = data.packets.map(p => `
        <div class="result-item">${p.type} package detected from ${p.source}</div>
    `).join('');
}
</script>
{% endblock %}
