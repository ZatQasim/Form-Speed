{% extends 'base.html' %}
{% block title %}Password Manager - Form Speed{% endblock %}
{% block content %}
<div class="dashboard">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}">Overview</a>
            <a href="{{ url_for('vpn_dashboard') }}">VPN</a>
            <a href="{{ url_for('speed_sharing_dashboard') }}">Speed Sharing</a>
            <a href="{{ url_for('incognito_mode') }}">Incognito Mode</a>
            <a href="{{ url_for('iot_dashboard') }}">IoT Control</a>
            <a href="{{ url_for('download_page') }}">Download</a>
            <a href="{{ url_for('security_dashboard') }}">Security</a>
            <a href="{{ url_for('tools_dashboard') }}">Tools</a>
            <a href="{{ url_for('cloud_dashboard') }}">Cloud</a>
            <a href="{{ url_for('connect_hub') }}">Connect</a>
            <a href="{{ url_for('analytics_dashboard') }}">Analytics</a>
            <a href="{{ url_for('password_manager') }}" class="active">Passwords</a>
            <a href="{{ url_for('history_dashboard') }}">History</a>
            <a href="{{ url_for('devices_dashboard') }}">Devices</a>
            <a href="{{ url_for('account_dashboard') }}">Account</a>
            <a href="{{ url_for('settings_dashboard') }}">Settings</a>
        </nav>
    </aside>
    <main class="dashboard-content">
        <div class="page-header">
            <h1>Password Manager</h1>
            <button class="btn btn-primary" onclick="showAddModal()">Add</button>
        </div>
        
        <div class="password-list" id="password-list">
            <!-- Passwords loaded here -->
        </div>
    </main>
</div>

<!-- Simple modal for adding -->
<div id="add-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:var(--bg-primary); padding:2rem; border-radius:12px; width:400px;">
        <h3>Add</h3>
        <div class="form-group">
            <label>Service/Title</label>
            <input type="text" id="service-input" class="form-control" placeholder="Google, WiFi, Token...">
        </div>
        <div class="form-group">
            <label>Username/Email</label>
            <input type="text" id="user-input" class="form-control">
        </div>
        <div class="form-group">
            <label>Password/Value</label>
            <input type="password" id="pass-input" class="form-control">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="cat-input" class="form-control">
                <option value="password">Password</option>
                <option value="token">Token</option>
                <option value="information">Information</option>
                <option value="email">Email Link</option>
                <option value="number">Phone Number</option>
            </select>
        </div>
        <div style="display:flex; gap:1rem; margin-top:1rem;">
            <button class="btn btn-primary" onclick="saveEntry()">Save</button>
            <button class="btn btn-outline" onclick="hideAddModal()">Cancel</button>
        </div>
    </div>
</div>

<style>
.password-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-top: 2rem;
}
.password-card {
    background: var(--bg-secondary);
    padding: 1rem;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border-light);
}
.entry-info h4 { margin: 0; }
.entry-info p { margin: 0; color: var(--text-secondary); font-size: 0.9rem; }
.category-badge {
    background: var(--primary-color);
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    text-transform: uppercase;
}
</style>

<script>
function showAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
function hideAddModal() { document.getElementById('add-modal').style.display = 'none'; }

async function loadPasswords() {
    const response = await fetch('/api/passwords/list');
    const data = await response.json();
    const list = document.getElementById('password-list');
    list.innerHTML = '';
    
    data.passwords.forEach(p => {
        const card = document.createElement('div');
        card.className = 'password-card';
        card.innerHTML = `
            <div class="entry-info">
                <h4>${p.service} <span class="category-badge">${p.category}</span></h4>
                <p>${p.username || 'No identifier'}</p>
            </div>
            <button class="btn btn-sm btn-outline" onclick="copyPass('${p.password}')">Copy</button>
        `;
        list.appendChild(card);
    });
}

async function saveEntry() {
    const payload = {
        service: document.getElementById('service-input').value,
        username: document.getElementById('user-input').value,
        password: document.getElementById('pass-input').value,
        category: document.getElementById('cat-input').value
    };
    await fetch('/api/passwords/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    hideAddModal();
    loadPasswords();
}

function copyPass(val) {
    navigator.clipboard.writeText(val);
    alert('Copied to clipboard');
}

loadPasswords();
</script>
{% endblock %}
