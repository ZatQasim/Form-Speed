{% extends 'base.html' %}

{% block title %}Login - Form Speed{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Form Speed" class="auth-logo">
        <h2>Welcome Back</h2>
        <p>Login to your Form Speed account</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        
        <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
    </div>
</div>
{% endblock %}
