{% extends 'base.html' %}
{% block title %}Cloud Storage - Form{% endblock %}
{% block content %}
<div class="dashboard">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}">Overview</a>
            <a href="{{ url_for('vpn_dashboard') }}">VPN</a>
            <a href="{{ url_for('speed_sharing_dashboard') }}">Speed Sharing</a>
            <a href="{{ url_for('security_dashboard') }}">Security</a>
            <a href="{{ url_for('mesh_dashboard') }}">Mesh Network</a>
            <a href="{{ url_for('tools_dashboard') }}">Tools</a>
            <a href="{{ url_for('cloud_dashboard') }}" class="active">Cloud</a>
            <a href="{{ url_for('analytics_dashboard') }}">Analytics</a>
            <a href="{{ url_for('password_manager') }}">Passwords</a>
            <a href="{{ url_for('history_dashboard') }}">History</a>
            <a href="{{ url_for('devices_dashboard') }}">Devices</a>
            <a href="{{ url_for('account_dashboard') }}">Account</a>
            <a href="{{ url_for('settings_dashboard') }}">Settings</a>
        </nav>
    </aside>
    <main class="dashboard-content">
        <h1>Cloud Storage</h1>
        <p class="page-description">Securely backup your media and manage your data.</p>
        
        <div class="cloud-actions">
            <input type="file" id="cloud-upload-input" style="display: none;">
            <button class="btn btn-primary" onclick="document.getElementById('cloud-upload-input').click()">Upload File</button>
            <select id="filter-type" class="btn btn-outline" onchange="loadFiles()">
                <option value="all">All Files</option>
                <option value="media">Media</option>
                <option value="data">Data</option>
                <option value="backup">Backup</option>
            </select>
        </div>

        <div class="cloud-grid" id="file-list">
            <!-- Files will be loaded here -->
        </div>
    </main>
</div>

<style>
.cloud-actions {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
}
.cloud-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.5rem;
}
.file-card {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
    position: relative;
    border: 1px solid var(--border-light);
}
.file-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
.file-name { 
    font-weight: 600; 
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis;
    margin-bottom: 0.25rem;
}
.file-info { font-size: 0.8rem; color: var(--text-secondary); }
.delete-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: none;
    border: none;
    color: #ff4d4d;
    cursor: pointer;
    font-size: 1.2rem;
}
</style>

<script>
async function loadFiles() {
    const response = await fetch('/api/cloud/files');
    const data = await response.json();
    const list = document.getElementById('file-list');
    const filter = document.getElementById('filter-type').value;
    
    list.innerHTML = '';
    
    data.files.filter(f => filter === 'all' || f.type === filter).forEach(file => {
        const card = document.createElement('div');
        card.className = 'file-card';
        const icon = file.type === 'media' ? '🖼️' : (file.type === 'backup' ? '📦' : '📄');
        card.innerHTML = `
            <button class="delete-btn" onclick="deleteFile(${file.id})">&times;</button>
            <div class="file-icon">${icon}</div>
            <div class="file-name">${file.name}</div>
            <div class="file-info">${(file.size / 1024 / 1024).toFixed(2)} MB</div>
        `;
        list.appendChild(card);
    });
}

async function deleteFile(id) {
    if(!confirm('Delete this file?')) return;
    await fetch(`/api/cloud/delete/${id}`, { method: 'DELETE' });
    loadFiles();
}

document.getElementById('cloud-upload-input').onchange = async function(e) {
    const file = e.target.files[0];
    if(!file) return;
    
    const type = file.type.startsWith('image/') || file.type.startsWith('video/') ? 'media' : 'data';
    const formData = new FormData();
    formData.append('file', file);
    formData.append('type', type);
    
    const btn = e.target.previousElementSibling;
    btn.textContent = 'Uploading...';
    btn.disabled = true;
    
    try {
        await fetch('/api/cloud/upload', {
            method: 'POST',
            body: formData
        });
        loadFiles();
    } catch (err) {
        alert('Upload failed');
    } finally {
        btn.textContent = 'Upload File';
        btn.disabled = false;
    }
};

loadFiles();
</script>
{% endblock %}
